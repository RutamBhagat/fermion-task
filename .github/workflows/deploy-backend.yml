name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build
        working-directory: apps/server

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r apps/server/dist deploy/
          cp apps/server/package.json deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Deploy to EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            # Stop existing application
            pm2 stop hono-backend || echo "Process not running"
            
            # Create application directory
            mkdir -p /opt/hono-backend
            cd /opt/hono-backend
            
            # Remove old files and extract new deployment
            rm -rf dist package.json
            
      - name: Copy files to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          source: "deploy.tar.gz"
          target: "/opt/hono-backend/"

      - name: Start application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          port: 22
          script: |
            cd /opt/hono-backend
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            # Install dependencies
            npm install --production
            
            # Start with PM2
            pm2 start dist/index.js --name hono-backend
            pm2 save