name: Deploy Backend to EC2

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - '.github/workflows/**'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build backend
        run: npm run build
        working-directory: apps/server

      - name: Create deployment package
        run: |
          mkdir -p deploy
          cp -r apps/server/dist deploy/
          cp apps/server/package.json deploy/
          tar -czf deploy.tar.gz -C deploy .

      - name: Prepare Directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/hono-backend
            
            sudo chown -R ubuntu:ubuntu /opt/hono-backend

      - name: Copy deployment package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/opt/hono-backend/"

      - name: Deploy and Start Application
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            
            cd /opt/hono-backend
            
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            pm2 stop hono-backend || echo "Process not running"
            
            npm install --production
            
            pm2 start dist/index.js --name hono-backend
            
            pm2 save