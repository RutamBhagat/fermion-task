name: Deploy Backend to EC2 with Docker

on:
  push:
    branches: [main]
    paths:
      - 'apps/server/**'
      - '.github/workflows/**'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'package.json'
      - 'package-lock.json'
      - 'turbo.json'
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create deployment package for Monorepo
        run: |
          mkdir -p deploy/apps
          cp package.json package-lock.json Dockerfile docker-compose.yml deploy/
          cp -r apps/server deploy/apps/
          tar -czf deploy.tar.gz -C deploy .

      - name: Prepare Directory on EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            sudo mkdir -p /opt/hono-backend
            sudo chown -R ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/hono-backend

      - name: Copy deployment package to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          source: "deploy.tar.gz"
          target: "/opt/hono-backend/"

      - name: Deploy and Start Application via Docker
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_PRIVATE_KEY }}
          script: |
            cd /opt/hono-backend
            
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz
            
            echo "Creating .env file..."
            cat > .env << EOF
            CORS_ORIGIN=${{ vars.CORS_ORIGIN }}
            NODE_ENV=${{ vars.NODE_ENV }}
            WEBRTC_LISTEN_IP=${{ vars.WEBRTC_LISTEN_IP }}
            ANNOUNCED_IP=${{ vars.ANNOUNCED_IP }}
            EOF
            
            echo "Creating production compose override..."
            cat > docker-compose.override.yml << EOF
            services:
              fermion-server:
                env_file:
                  - ./.env
            EOF
            
            echo "Starting application with Docker Compose..."
            docker-compose down
            docker-compose up --build -d
            
            echo "Cleaning up old Docker images..."
            docker image prune -a -f